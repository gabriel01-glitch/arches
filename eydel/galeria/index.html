<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cream:#fbf7f0;--surface:#fffdf9;--ink:#2c2722;--muted:#9a8f83;--line:#e9e0d3;--terra:#bf5a36;}
*{box-sizing:border-box;} body{margin:0;background:var(--cream);color:var(--ink);font-family:Nunito,sans-serif;}
header{text-align:center;padding:30px 18px 10px;}
h1{font-family:'Cormorant Garamond',serif;font-size:34px;margin:0;} h1 .nm{color:var(--terra);}
.sub{color:var(--muted);font-size:15px;margin-top:6px;}
.back{display:inline-block;margin:14px 0 0;color:var(--terra);text-decoration:none;font-weight:700;font-size:14px;}
.grid{columns:4 220px;column-gap:12px;padding:22px 18px 70px;max-width:1100px;margin:0 auto;} @media(max-width:640px){.grid{columns:2 150px;}}
.card{display:inline-block;width:100%;margin:0 0 12px;break-inside:avoid;cursor:zoom-in;}
.card img{width:100%;display:block;border-radius:12px;border:1px solid var(--line);background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .15s,box-shadow .15s;}
.card:hover img{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.12);}
.lb{position:fixed;inset:0;background:rgba(28,24,20,.94);display:none;align-items:center;justify-content:center;z-index:50;}
.lb.on{display:flex;} .lb img{max-width:94vw;max-height:88vh;border-radius:8px;}
.lb .x{position:absolute;top:16px;right:22px;color:#fff;font-size:40px;cursor:pointer;line-height:1;font-family:Nunito;}
.lb .nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:52px;cursor:pointer;user-select:none;padding:0 18px;opacity:.8;} .lb .prev{left:4px;} .lb .next{right:4px;}
.lb .cnt{position:absolute;bottom:18px;left:0;right:0;text-align:center;color:#fff;font-weight:700;font-size:14px;opacity:.85;}
</style></head><body>

<div class="lb" id="lb"><span class="x" onclick="close_()">&times;</span><span class="nav prev" onclick="nav(-1)">&#8249;</span><img id="lbi" src=""><span class="nav next" onclick="nav(1)">&#8250;</span><span class="cnt" id="cnt"></span></div>
<script>
var N=60,cur=0,lb=document.getElementById('lb'),lbi=document.getElementById('lbi'),cnt=document.getElementById('cnt');
function show(i){cur=(i+N)%N;lbi.src=String(cur+1).padStart(2,'0')+'.jpg';cnt.textContent=(cur+1)+' / '+N;lb.classList.add('on');}
function nav(d){show(cur+d);} function close_(){lb.classList.remove('on');}
document.querySelectorAll('.card').forEach(function(a){a.addEventListener('click',function(e){e.preventDefault();show(parseInt(a.dataset.i));});});
lb.addEventListener('click',function(e){if(e.target===lb)close_();});
document.addEventListener('keydown',function(e){if(!lb.classList.contains('on'))return;if(e.key==='Escape')close_();if(e.key==='ArrowRight')nav(1);if(e.key==='ArrowLeft')nav(-1);});
</script></body></html>
