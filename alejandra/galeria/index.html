<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--cream:#fbf7f0;--surface:#fffdf9;--ink:#2c2722;--muted:#9a8f83;--line:#e9e0d3;--terra:#bf5a36;--terra-dark:#9f4528;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:"Nunito",sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  .wrap{max-width:1000px;margin:0 auto;padding:26px 16px 60px;}
  .back{display:inline-block;color:var(--terra);font-weight:800;font-size:15px;text-decoration:none;padding:6px 2px;margin-bottom:8px;}
  .hero{padding:6px 2px 22px;border-bottom:1px solid var(--line);margin-bottom:22px;}
  .title{font-family:"Cormorant Garamond",serif;font-weight:700;font-size:46px;line-height:1.02;color:var(--ink);}
  .title .nm{color:var(--terra);}
  .sub{font-size:15px;color:var(--muted);font-weight:600;margin-top:10px;line-height:1.45;}
  .grid{column-count:3;column-gap:12px;}
  @media(max-width:720px){.grid{column-count:2;column-gap:10px;}}
  @media(max-width:420px){.grid{column-count:2;column-gap:8px;}}
  .ph{width:100%;display:block;border-radius:12px;border:1px solid var(--line);margin:0 0 12px;cursor:zoom-in;background:var(--surface);transition:transform .1s ease,box-shadow .15s ease;}
  .ph:active{transform:scale(.99);}
  .credit{text-align:center;color:#c9bdac;font-size:11.5px;font-weight:700;margin-top:34px;letter-spacing:.5px;}
  /* lightbox */
  .lb{position:fixed;inset:0;background:rgba(28,24,20,.94);display:none;align-items:center;justify-content:center;z-index:50;}
  .lb.on{display:flex;}
  .lb img{max-width:94vw;max-height:86vh;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5);}
  .lb .x{position:absolute;top:14px;right:18px;color:#fff;font-size:34px;font-weight:300;cursor:pointer;line-height:1;font-family:"Nunito",sans-serif;}
  .lb .nav{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:44px;font-weight:300;cursor:pointer;padding:10px 18px;user-select:none;opacity:.8;}
  .lb .nav:active{opacity:1;}
  .lb .prev{left:4px;} .lb .next{right:4px;}
  .lb .count{position:absolute;bottom:16px;left:0;right:0;text-align:center;color:#e8dccb;font-size:13px;font-weight:700;letter-spacing:.5px;}
</style>
</head>

<div class="lb" id="lb">
  <span class="x" id="x">&times;</span>
  <span class="nav prev" id="prev">&#8249;</span>
  <img id="lbimg" src="" alt="">
  <span class="nav next" id="next">&#8250;</span>
  <div class="count" id="count"></div>
</div>
<script>
  var imgs=[].slice.call(document.querySelectorAll(".ph"));
  var lb=document.getElementById("lb"),lbimg=document.getElementById("lbimg"),count=document.getElementById("count");
  var cur=0;
  function show(i){cur=(i+imgs.length)%imgs.length;lbimg.src=imgs[cur].getAttribute("src");count.textContent=(cur+1)+" / "+imgs.length;lb.classList.add("on");}
  function hide(){lb.classList.remove("on");lbimg.src="";}
  imgs.forEach(function(im,i){im.addEventListener("click",function(){show(i);});});
  document.getElementById("x").addEventListener("click",hide);
  document.getElementById("next").addEventListener("click",function(e){e.stopPropagation();show(cur+1);});
  document.getElementById("prev").addEventListener("click",function(e){e.stopPropagation();show(cur-1);});
  lb.addEventListener("click",function(e){if(e.target===lb)hide();});
  document.addEventListener("keydown",function(e){if(!lb.classList.contains("on"))return;if(e.key==="Escape")hide();else if(e.key==="ArrowRight")show(cur+1);else if(e.key==="ArrowLeft")show(cur-1);});
</script>
