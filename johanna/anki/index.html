<html lang="es">
<head>

<title>A Pulir · Johanna</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--cream:#fbf7f0;--terra:#bf5a36;--terra-dark:#9f4528;--ink:#3d3428;--soft:#8a7d6b;--line:#e8dfd2;--green:#6f8f5f;--gold:#c9a04e;--surface:#fffdf9;--good-tint:#e6efe2;--bad-tint:#f6e2da}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);color:var(--ink);font-family:'Nunito',sans-serif;font-size:16px;line-height:1.55;padding-bottom:50px}
header{text-align:center;padding:30px 18px 8px}
h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:32px;color:var(--terra)}
header p{color:var(--soft);font-size:13.5px;margin-top:4px}
.count{display:inline-block;margin-top:10px;background:#fff;border:1px solid var(--line);border-radius:99px;padding:6px 16px;font-weight:800;font-size:13px;color:var(--terra)}
main{max-width:620px;margin:0 auto;padding:16px}
.round{background:var(--surface);border:1.5px solid var(--line);border-radius:16px;padding:18px;margin-bottom:13px;cursor:pointer}
.round:active{transform:scale(.99)}
.round .nm{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:24px}
.round .st{font-size:13px;color:var(--soft);font-weight:700;margin-top:3px}
.round .no{font-size:13.5px;color:var(--soft);font-weight:600;margin-top:5px}
.bar{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:12px}
.bar i{display:block;height:100%;background:var(--terra);transition:width .3s ease}
.progress{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:16px}
.progress div{height:100%;background:var(--terra);width:0%;transition:width .3s ease}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 18px}
.kicker{font-size:11.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--terra);margin-bottom:8px}
.prompt{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;line-height:1.35;margin-bottom:10px}
.pron-word{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:34px;text-align:center;margin:8px 0 4px}
.pron-arch{text-align:center;font-size:21px;font-weight:800;color:var(--terra);letter-spacing:.5px;margin-bottom:8px}
.dots{margin:0 0 12px}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:var(--line);margin-right:5px}
.dot.on{background:var(--green)}
input[type=text]{width:100%;background:var(--cream);border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:16px;font-family:'Nunito',sans-serif;color:var(--ink)}
input:focus{outline:none;border-color:var(--terra)}
.row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
button{font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;border:none;border-radius:10px;padding:12px 18px;cursor:pointer}
button:active{transform:scale(.96)}
.main-btn{background:var(--terra);color:#fff}
.ghost{background:transparent;color:var(--soft);border:1.5px solid var(--line)}
.good{background:var(--green);color:#fff}
.audio{background:var(--gold);color:#fff}
.fb{margin-top:14px;font-weight:800;display:none;padding:10px 12px;border-radius:10px}
.fb.ok{color:var(--green);background:var(--good-tint);display:block}
.fb.close{color:#9a6b1e;background:#f7eede;display:block}
.fb.no{color:var(--terra-dark);background:var(--bad-tint);display:block}
.answer{display:none;margin-top:10px;padding:14px;border-radius:10px;background:var(--cream);border:1px dashed var(--terra);font-weight:700;line-height:1.6}
.answer div{margin:2px 0}
.fin{text-align:center;padding:26px 10px}
.fin h2{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--terra)}
.fin p{color:var(--soft);margin-top:8px}
.backlink{display:block;text-align:center;margin-top:18px;color:var(--terra);font-weight:800;text-decoration:none;font-size:13.5px;background:none;border:none;width:100%;cursor:pointer}
footer{text-align:center;color:var(--soft);font-size:12px;padding:22px 16px 8px}
</style>
</head>

<header>

", "f": "Tommy, please behave in class and listen to the teacher.Sarah's behavior at the playground was excellent; she shared her toys and played nicely with her friends.How we behave in public reflects on our character and upbringing.The teacher praised James for his improved behavior in the classroom.Good behavior in school can lead to rewards, like stickers or extra playtime.", "b": ["Despite numerous warnings, Timmy continued misbehaving in class, disrupting the lesson for everyone.My cat has been misbehaving lately, scratching the furniture and knocking things off shelves.Jenny's dog started misbehaving at the park, chasing after other dogs and refusing to come when called."]}, {"id": "1714425808447", "f": "más delgada/o", "b": ["\"Thinner\" is more formal. \"Skinnier\" is more casual."]}, {"id": "1718749452262", "f": "maduro inmaduro", "b": ["mature", "immature", "immature behavior (to behave is the verb) /bii-JEIV-ier/", "(to misbehave, comportarse mal: He misbehaved today!)"]}, {"id": "1720919094807", "f": "soledad, tristeza, locura, enfermedad, felicidad, amabilidad, debilidad, oscuridad, brillo, bondad, quietud, calma", "b": ["loneliness, sadness, madness, sickness/illness, happiness, kindness, weakness, darkness, brightness, goodness, stillness, calmness"]}, {"id": "1739832794187", "f": "escoger escogió", "b": ["Presente: \"I choose to study Spanish.\" se traduce como \"Yo elijo estudiar español.\"", "Pasado: \"She chose the blue dress.\" se traduce como \"Ella eligió el vestido azul.\""]}], "hist": [{"id": "1710367212946", "f": "🌟 The Tale of Johanna’s Voyage into English (Tail: cola) In the sun-drenched and colorful land of Mexico, there lived a girl with a curious gaze named Johanna. Johanna had a dream: to master the enchanting language of English. Chapter 1: The Whispering Winds of Welcome On a radiant morning, Johanna entered the Language Jungle, where the winds whispered greetings from distant lands. She practiced /PRAK-tist/ with the parrots, saying, “Hello! Good morning! Good evening!” until her voice resonated through the trees. Chapter 2: The Luminous Lexicon Lagoon Venturing further, she discovered the Luminous Lexicon Lagoon, aglow with new words. Johanna dipped her toes into the waters, learning ‘apple’, ‘book’, and ‘friend’, each word a shining jewel. Chapter 3: The Mighty Grammar Mountains The Grammar Mountains rose before her, their peaks tall and formidable. But Johanna was not discouraged. She climbed, mastering verbs like ‘am’, ‘are’, and ‘is’, and from the summit, she beheld the vast expanse of the English kingdom. Chapter 4: The Chattering Chorus of the Conversation River Down from the mountains flowed the Conversation River, where fish chattered phrases day and night. Johanna learned to ask, “How are you?” and reply, “I’m fine, thank you! What’s your name?” Her confidence grew like the river’s current. Chapter 5: The Pattering Pronunciation Waterfall At the Pronunciation Waterfall, Johanna listened to the pattering sounds of ‘th’, ‘r’, and ‘v’. She repeated them until her tongue danced with the rhythm of the falling water. Chapter 6: The Whimsical Writing Woods In the Whimsical Writing Woods, Johanna found a quill and parchment. She wrote tales of sunny days and her love for learning English, her words weaving through the trees like magic. Chapter 7: The Tricky Testing Trail The Testing Trail was filled with puzzles and quizzes, but Johanna approached them with joy. Each riddle solved brought her one step closer to her dream. Chapter 8: The Cultural Caverns The Cultural Caverns were a festival of stories and melodies from English-speaking cultures. Johanna explored every corner, soaking in the rich tapestry of traditions and expressions. Chapter 9: The Fountain of Fluency Finally, Johanna reached the Fountain of Fluency. She drank deeply, and her speech flowed with ease and grace, her English as vibrant as her native land. Chapter 10: The Glade of Glory Emerging into the Glade of Glory, Johanna was greeted with a celebration. She had navigated the Language Jungle and emerged victorious, her dream of speaking English realized. And so, Johanna’s story inspires us: Practice every day. Embrace your mistakes. Let your love for the language shine.", "b": ["🌟 El Cuento del Viaje de Johanna al Inglés", "En la tierra llena de sol y color de México, vivía una chica de mirada curiosa llamada Johanna. Johanna tenía un sueño: dominar el encantador idioma inglés.", "Capítulo 1: Los Vientos Susurrantes de Bienvenida", "Una mañana radiante, Johanna entró en la Jungla del Lenguaje, donde los vientos susurraban saludos de tierras lejanas. Practicó con los loros, diciendo: “¡Hello! (¡Hola!) Good morning! (¡Buenos días!) Good evening! (¡Buenas noches!)” hasta que su voz resonó a través de los árboles.", "Capítulo 2: La Laguna Luminosa del Léxico", "Adentrándose más, descubrió la Laguna Luminosa del Léxico, resplandeciente con palabras nuevas. Johanna sumergió sus dedos en las aguas, aprendiendo ‘apple’ (manzana), ‘book’ (libro) y ‘friend’ (amigo), cada palabra una joya brillante.", "Capítulo 3: Las Poderosas Montañas de la Gramática", "Las Montañas de la Gramática se alzaban adelante, con picos altos e intimidantes. Pero Johanna no se desanimó. Escaló, conquistando verbos como ‘am’ (soy), ‘are’ (eres) y ‘is’ (es), y desde la cima, vio la vasta extensión del reino inglés.", "Capítulo 4: El Coro Parlante del Río de la Conversación", "Abajo de las montañas fluía el Río de la Conversación, donde los peces charlaban frases día y noche. Johanna aprendió a preguntar: “How are you? (¿Cómo estás?)” y responder: “I’m fine, thank you! (¡Estoy bien, gracias!) What’s your name? (¿Cómo te llamas?)” Su confianza creció como la corriente del río.", "Capítulo 5: La Cascada de la Pronunciación", "En la Cascada de la Pronunciación, Johanna escuchó los sonidos golpeteantes de ‘th’, ‘r’ y ‘v’. Los repitió hasta que su lengua bailó con el ritmo del agua que caía.", "Capítulo 6: El Bosque Caprichoso de la Escritura", "En el Bosque Caprichoso de la Escritura, Johanna encontró una pluma y un pergamino. Escribió cuentos de días soleados y su amor por aprender inglés, sus palabras tejiéndose a través de los árboles como magia.", "Capítulo 7: El Sendero de las Pruebas Complicadas", "El Sendero de las Pruebas estaba lleno de acertijos y cuestionarios, pero Johanna los abordó con alegría. Cada acertijo resuelto la acercaba un paso más a su sueño.", "Capítulo 8: Las Cavernas Culturales", "Las Cavernas Culturales eran un festival de historias y melodías de las culturas de habla inglesa. Johanna exploró cada rincón, absorbiendo el rico tapiz de tradiciones y expresiones.", "Capítulo 9: La Fuente de la Fluidez", "Finalmente, Johanna llegó a la Fuente de la Fluidez. Bebió profundamente y su discurso fluyó con facilidad y gracia, su inglés tan vibrante como su tierra natal.", "Capítulo 10: El Claro de la Gloria", "Emergiendo en el Claro de la Gloria, Johanna fue recibida con una fiesta. Había navegado por la Jungla del Lenguaje y emergido victoriosa, su sueño de hablar inglés hecho realidad.", "Y así, la historia de Johanna nos inspira:", "Practica todos los días.", "Acepta tus errores.", "Deja que tu amor por el idioma brille."]}, {"id": "1718219019075", "f": "Ana decidió aprender a tocar la guitarra porque siempre le ha gustado la música. Empezó a tomar clases los sábados por la mañana y practica todos los días.", "b": ["Ana decided to learn to play the guitar because she has always liked music. She started taking lessons on Saturday mornings and practices every day."]}, {"id": "1718219047957", "f": "Ayer, mientras caminábamos por el parque, vimos un grupo de niños jugando al fútbol. Nos sentamos en un banco cercano y disfrutamos del partido.", "b": ["Yesterday, while we were walking through the park, we saw a group of children playing soccer. We sat on a nearby bench and enjoyed the game."]}, {"id": "1718219087771", "f": "Carlos y Marta planearon un viaje a la montaña para el fin de semana. Llenaron sus mochilas con comida, agua y ropa abrigada, y salieron temprano por la mañana.", "b": ["Carlos and Marta planned a trip to the mountains for the weekend. They filled their backpacks with food, water, and warm clothes, and left early in the morning."]}, {"id": "1718219177848", "f": "La profesora explicó que, si queremos mejorar nuestras habilidades en inglés, debemos practicar todos los días y no tener miedo de cometer errores.", "b": ["The teacher explained that, if we want to improve our English skills, we must practice every day and not be afraid of making mistakes."]}, {"id": "1718219199959", "f": "Pedro estaba emocionado porque iba a visitar a sus abuelos en el campo. Siempre disfruta pasar tiempo con ellos y ayudar en la granja.", "b": ["Pedro was excited because he was going to visit his grandparents in the countryside. He always enjoys spending time with them and helping on the farm."]}, {"id": "1718219261495", "f": "Aunque Laura tenía mucho trabajo, decidió tomarse un descanso y salir a caminar. Pensó que un poco de aire fresco le ayudaría a concentrarse mejor al regresar.", "b": ["Although Laura had a lot of work, she decided to take a break and go for a walk. She thought that a bit of fresh air would help her concentrate better when she returned."]}, {"id": "1718219286107", "f": "El sábado pasado, mis amigos y yo fuimos a la playa. Nadamos en el mar, jugamos voleibol y comimos un delicioso almuerzo en un restaurante cercano.", "b": ["Last Saturday, my friends and I went to the beach. We swam in the sea, played volleyball, and had a delicious lunch at a nearby restaurant."]}, {"id": "1718219306883", "f": "María siempre soñaba con visitar París. Ahorra dinero todos los meses y espera poder realizar su sueño el próximo año.", "b": ["María always dreamed of visiting Paris. She saves money every month and hopes to make her dream come true next year."]}, {"id": "1718219335069", "f": "Cuando era niño, Juan pasaba los veranos en la casa de sus abuelos. Le encantaba jugar en el jardín y escuchar las historias que le contaban.", "b": ["When he was a child, Juan spent summers at his grandparents' house. He loved playing in the garden and listening to the stories they told him."]}, {"id": "1718219353871", "f": "El chef explicó que, para preparar una buena paella, es importante usar ingredientes frescos y seguir la receta con cuidado.", "b": ["The chef explained that, to prepare a good paella, it is important to use fresh ingredients and follow the recipe carefully."]}], "pat": [{"id": "1705963537981", "f": "What are you interested /IN-tres-ted/ in?", "b": ["I am (I'm) interested in health.", "I am (I'm) interested in music.", "I am (I'm) interested in nutrition.", "******", "I'm interested /IN-tres-ted/ in buying a new car. (interesado en)", "I'm interested in opening a new account for my job.", "I'm interested in hiring a new accountant for my job.", "I'm interested in playing the guitar.", "I'm interested in going to the moon.", "I'm interested in exercising (today)."]}, {"id": "1706132378211", "f": "Make the question:", "b": ["When were you born?"]}, {"id": "1706224814770", "f": "Explain how much you'll charge me for your business.", "b": ["Well, it depends...", "How many people we need (working) at the place.", "How many people need to do this job.", "How long we'll take cleaning the place/your property.", "(Also,) The measurements /ME-shier-ments/ too (or, as well... also) ***Just use 1... also, too or as well.). We need to know how big/large your place is.", "**** \"Too\" and \"as well\" at the end******", "Too much (demasiado)"]}, {"id": "1706226609365", "f": "Tenemos que.... Necesitamos recogerte a las 5:30. Necesitamos dejarte a las 5:30.", "b": ["We need to... measure the place.", "We have to... measure the place.", "We must.... measure the place.", "We have to pick you up at 5:30.", "We have to drop you off at 5:30."]}, {"id": "1706568275341", "f": "I fed him at 3pm.", "b": ["Johanna's way:", "At what time did you feed him?", "The other way:", "When did you feed him?"]}, {"id": "1706568466134", "f": "Where did you go?", "b": ["We went to the park."]}, {"id": "1706738581989", "f": "Comparative and Superlative", "b": ["Good --- Better ---- Best", "Early-----Earlier-----Earliest", "Fast------Faster-----Fastest", "Pretty----Prettier /PRI-ri-er/----Prettiest /PRI-ri-est/", "Smart----Smarter----SmartEST /smar-est/", "Intelligent----more intelligent-----most intelligent", "She is more intelligent than he is.", "He is the most intelligent person I know."]}, {"id": "1706824522313", "f": "Ella se ríe de su esposo. Ella siempre se ríe de su esposo.", "b": ["She laughs at her husband.", "She is always laughing at her husband."]}, {"id": "1707342193937", "f": "¿Esa es la verdad? ¿Eso es verdadero?", "b": ["Is that the truth? (noun) /truzh/ (Yes or no questions)", "Yes, that's (that is) the truth.", "No, that's (that is) not the truth.", "No, that isn't (is not) the truth.", "Is that true? (adjective) /tru/", "Yes, that's (that is) true.", "No, that's (that is) not true.", "No, that isn't (is not) true."]}, {"id": "1707342713872", "f": "Mom, your car doesn't start.", "b": ["It doesn't (start)?", "My car doesn't start?"]}, {"id": "1707342888902", "f": "Is it hot?", "b": ["Yes, it is.", "No, it's (it is) not.", "No, it is not (isn't)."]}, {"id": "1707342987557", "f": "Do you like it?", "b": ["Yes, I do (like it). Yes, I like it.", "No, I do not (don't)."]}, {"id": "1707947276858", "f": "La gente detrás de mí... ...que había/era un ratón.", "b": ["People behind me (NOT \"TO\" me)", "The people behind me", "it was a mouse", "there was a mouse there"]}, {"id": "1708034389687", "f": "Yo medito. Estoy meditando. Me gusta la meditación.", "b": ["I meditate. /ME-ri-teit/ (verbo)", "I am meditating. /ME-ri-tei-rin/ (verbo)", "I like meditation. /ME-ri-tei-shon/ (noun/sustantivo)", "I like meditating.", "I like to meditate."]}, {"id": "1708985568529", "f": "Perdí pelo.", "b": ["I lost hair."]}, {"id": "1708987639358", "f": "I didn't see it. (Yo tampoco.)", "b": ["I didn't either.", "Me neither."]}, {"id": "1709155516535", "f": "I owe you (i o u) Ella le debe a él. Él le debe a ella. Ella le pertenece a él. Él le pertenece a ella.", "b": ["She owes him.", "He owes her.", "He owns her.", "She owns him."]}, {"id": "1709759652511", "f": "\"Mi trabajo terminará\" - Futuro Simple. \"Mi trabajo estará terminando\" - Futuro Continuo.", "b": ["\"My work will end\" - Future Simple tense.", "\"My work will be ending\" - Future Continuous tense."]}, {"id": "1709762106842", "f": "Depende cuánto tiempo le dedicas. Depende cuánto tiempo le dedicarás. Depende cuánto tiempo le dedicarías. Depende cuánto tiempo le estarías dedicando. Depende cuánto tiempo le estarás dedicando. estar dispuesto", "b": ["Depende cuánto tiempo le dedicas.Translation: “It depends on how much time you dedicate (to it).”Tense: Present indicative.Meaning: Refers to a general or habitual action in the present. It talks about what happens regularly.", "Depende cuánto tiempo le dedicarás.Translation: “It depends on how much time you will dedicate.”Tense: Future indicative.Meaning: Refers to a specific action that will happen in the future.", "Depende cuánto tiempo le dedicarías.Translation: “It depends on how much time you would dedicate.”Tense: Conditional.Meaning: Refers to a hypothetical situation or a condition. It implies that the dedication depends on certain circumstances.", "Depende cuánto tiempo le estarías dedicando.Translation: “It depends on how much time you would be dedicating.”Tense: Conditional progressive.Meaning: Similar to the previous sentence but emphasizes ongoing or continuous dedication.", "Depende cuánto tiempo le estarás dedicando.Translation: “It depends on how much time you will be dedicating.”Tense: Future progressive.Meaning: Refers to an ongoing action in the future. It emphasizes the duration of dedication.", "Moods:Moods indicate the speaker’s intention or attitude.Indicative Mood (Modo Indicativo): Used for factual statements or reality.Example: “He runs every morning.”Subjunctive Mood (Modo Subjuntivo): Used for desires, doubts, or hypothetical situations.Example: “I wish he would run more.”", "There are two main conditional tenses:", "Conditional Simple Tense:Usage: Used for something that might happen in hypothetical situations.Example: “I would fly to Sydney if I had the money.”In this sentence, the speaker imagines flying to Sydney under the condition of having enough money.", "Conditional Progressive Tense:Usage: Used for ongoing actions in hypothetical situations.Example: “I would be going home if you came with me.”Here, the speaker envisions going home, emphasizing the ongoing nature of the action, provided the other person accompanies them.", "be willing to"]}, {"id": "1709762451113", "f": "1. ¿Quieres ir al cine? 2. ¿Te gustaría ir al cine? 3. ¿Podrías ir al cine? 4. ¿Puedes ir al cine?", "b": ["1. Do you want to go to the movies? Yes, I do.,", "2. Would you like to go the movies? Yes, I would.", "3. Could you go to the movies? Yes, I could.", "4. Can you go to the movies? Yes, I can."]}, {"id": "1709848310574", "f": "supposedly /su-POOS-ed-li/ (reportedly) I suppose /su-POOS/ I receive my check today. Supposedly, I receive my check today.", "b": ["Do you like your job?", "I suppose."]}, {"id": "1709848890204", "f": "This worker (sustantivo) is hardworking (adjetivo). How does Veronica work? How hardworking is Veronica?", "b": ["Este trabajador (noun) es trabajador (adjetivo).", "¿Cómo trabaja Veronica?", "¿Cómo es de trabajadora Veronica?"]}, {"id": "1710015882131", "f": "This worker is hardworking. (noun: sustantivo, cualquier cosa) Este trabajador es trabajador. This woman is intelligent. (adjective: adjetivo, describe la cosa) Esta mujer es inteligente. This boy is very active. (adjective modifier: modificador del adjetivo, modifica al adjetivo) Este chico es muy activo. This boy is beautiful. This turtle is very slow. These turtles are very slow.", "b": ["This is a hardworking worker. Este es un trabajador trabajador.", "This is an intelligent woman. Esta es una mujer inteligente.", "This is a very active boy. Este es un chico muy activo.", "This is a beautiful boy.", "This is a very slow turtle.", "These are very slow turtles. /TER-els/"]}, {"id": "1710728125704", "f": "Lightning Storm and Thunderstorm", "b": ["Lightning: This is a visible electrical discharge that occurs /a-QURS/ during a storm. It appears as a bright, jagged, and sometimes branching streak of light in the sky.", "Thunder: This is the sound produced by the rapid expansion of air surrounding a lightning bolt. It can vary/change (cambia) in intensity and duration, depending on the distance and the type of storm.", "variety /va-RAI-eri/ /variedad)", "A thunderstorm is a weather event characterized by the presence of both lightning and thunder. It involves the development of convective clouds that can produce heavy rainfall, hail, and sometimes tornadoes.", "You can estimate the distance between you and a lightning strike by using the “flash-to-bang” method /ME-thod/, which takes advantage of the difference in speed between light and sound. Here’s how you can do it:", "Watch for Lightning: When you see a flash of lightning, start counting the seconds.", "Listen for Thunder: Stop counting when you hear the thunder.", "Calculate the Distance:", "If you want to know the distance in miles, divide the number of seconds you counted by 5.", "For the distance in kilometers /kil-O-mer-ers/, divide the number of seconds by 3.", "This method works because light travels much faster than sound. You see the lightning almost immediately because light travels at about 186 (thousand), 291 miles per second, while sound travels at about 0.21-0.22 miles per second in dry air. It takes approximately 5 seconds for the sound to travel one mile and about 3 seconds to travel one kilometer.", "So, if you counted 10 seconds between the lightning flash and the thunder, the lightning strike /straik/ was about 2 miles (or roughly 3.3 kilometers) away from you.", "Remember, this is an approximation and actual conditions like temperature and humidity can affect the speed of sound, so the distance calculated is a rough estimate."]}, {"id": "1712008141641", "f": "1. My mother’s last name is Martinez. 2. Adam’s daughter is very pretty. 3. I like Susana and Patrick’s house. 4. This is Anna’s new car. 5. Richard’s job is easy. 6. What is your sister’s name? 7. Canada’s weather is very cold. 8. Alex and Frank’s mother is in Mexico. 9. The TV is in my children’s room. 10. My daughter’s teacher is a nice man.", "b": ["1. Her last name is Martinez.", "2. His daughter is very pretty.", "3. I like their house. (That house is theirs.)", "4.This is her new car.", "5. His job is easy.", "6. What is her name?", "7. Its weather is very cold.", "8. Their mother is in Mexico.", "9. he TV is in their room. (That room is theirs.)", "10. Her teacher is a nice man."]}, {"id": "1712611511455", "f": "Change it to plural: This is a nice dog. This is an awesome movie. This is a great doctor.", "b": ["These are nice dogs.", "These are awesome movies.", "These are great doctors."]}, {"id": "1713651679578", "f": "I want to become_____ healthy. (Quiero llegar a estar/ser saludable. / Quiero volverme saludable.) I want to be healthy. (Quiero estar/ser sano.) I want to be in good health. (Quiero estar/ser saludable.)", "b": ["She will become a skinny/thin person.", "She wants to be(come) a doctor when she grows up.", "Johanna wants to study English when she has energy.", "She wants to be(come) a model when she loses weight.", "With practice, you will become more confident in your abilities.", "Learning a new language can become easier with effort."]}, {"id": "1714427425470", "f": "small (adjetivo): smaller (comparativo) smallest (superlativo)", "b": ["This shoe is smaller than the other shoe. (Este zapato es más pequeño que el otro.)", "This shoe is the smallest. (Este zapato es el más pequeño.)"]}, {"id": "1715294705598", "f": "Hablo conmigo misma/o A veces me sorprendo hablando conmigo mismo en voz alta. A menudo me encuentro hablando solo. Me he dado cuenta de que hablar conmigo mismo es una forma de procesar emociones y tomar decisiones.", "b": ["I talk to myself", "Sometimes, I catch myself talking to myself out loud.", "I often find myself having conversations with myself.", "I've realized that talking to myself is a way for me to process emotions and make decisions."]}, {"id": "1718750115154", "f": "1. Juan corre todas las mañanas. 2. Juan está corriendo todas las mañanas.", "b": ["1. Juan runs every morning.", "2. Juan is running every morning.", "I run every morning.", "You run every morning.", "He/She/It runs every morning.", "We run every morning.", "You run every morning.", "They run every morning."]}, {"id": "1723324405230", "f": "El sol sale por el este y se pone por el oeste.", "b": ["The sun rises in the east and_sets_ in the west.", "sunrise (amanecer)", "sunset (atardecer)", "raises (levantar o subir) - The government raises our taxes! Raise your hand!"]}, {"id": "1723672229128", "f": "¿Cuántos años tenía tu mamá cuando te tuvo? ¿Cuando naciste?", "b": ["How old was your mother (she) when she had you? When you were born?"]}, {"id": "1724450420224", "f": "Cuando la conocí... Al lado de la ventana...", "b": ["When I met her..."]}, {"id": "1725064560894", "f": "Ellos me estaban esperando ¿Tienes tiempo para platicar?", "b": ["They were waiting for me", "¿Do you have time to talk?"]}]};

 {key:"fix",  type:"typed", name:"Corrige la frase", note:"Tus frases reales: del error a la version correcta.", kicker:"Corrige", ph:"Escribela bien..."},

var MASTER_AT = 2, LS = "apulir_johanna_v2";
var mastery = {};
try{ mastery = JSON.parse(localStorage.getItem(LS)) || {}; }catch(e){}
function save(){ try{ localStorage.setItem(LS, JSON.stringify(mastery)); }catch(e){} }
function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
function scoreOf(c){ return mastery[c.id]||0; }
function speakable(t){ return t.replace(/\/[^\/]*\//g,"").replace(/\([^)]*\)/g,"").trim(); }
function speak(t,rate){ try{ var u=new SpeechSynthesisUtterance(speakable(t)); u.lang="en-US"; u.rate=rate||0.9; speechSynthesis.cancel(); speechSynthesis.speak(u); }catch(e){} }
var CMAP={"it's":"it is","i'm":"i am","don't":"do not","doesn't":"does not","didn't":"did not","isn't":"is not","can't":"cannot","won't":"will not","i'll":"i will","that's":"that is","wasn't":"was not","he's":"he is","she's":"she is"};
function norm(s){
  s=(s||"").toLowerCase().replace(/[‘’ʼ`]/g,"'");
  s=s.replace(/\/[^\/]*\//g," ").replace(/\([^)]*\)/g," ");
  Object.keys(CMAP).forEach(function(k){ s=s.split(k).join(CMAP[k]); });
  return s.replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();
}
function lev(a,b){var m=[];for(var i=0;i<=b.length;i++){m[i]=[i];}for(var j=0;j<=a.length;j++){m[0][j]=j;}for(i=1;i<=b.length;i++){for(j=1;j<=a.length;j++){m[i][j]=b.charAt(i-1)===a.charAt(j-1)?m[i-1][j-1]:Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1);}}return m[b.length][a.length];}
function check(val,targets){
  var v=norm(val); if(!v) return "no";
  var best=99, bt="";
  targets.forEach(function(t){ var n=norm(t); if(!n)return; var d=lev(v,n); if(d<best){best=d;bt=n;} });
  if(best===0) return "ok";
  var tol=Math.max(1,Math.floor(bt.length*0.1));
  return best<=tol ? "close" : "no";
}
var queue=[], idx=0, trackIdx=0;
function mcount(cs){ var m=0; cs.forEach(function(c){ if(scoreOf(c)>=MASTER_AT)m++; }); return m; }
function allCards(){ var a=[]; TRACKS.forEach(function(t){ a=a.concat(DATA[t.key]); }); return a; }
function renderHome(){
  document.getElementById("play").style.display="none";
  var home=document.getElementById("home"); home.style.display="block"; home.innerHTML="";
  var ac=allCards();
  document.getElementById("count").textContent = mcount(ac)+" dominadas de "+ac.length;
  TRACKS.forEach(function(t,i){
    var cs=DATA[t.key], m=mcount(cs), pct=Math.round(m/cs.length*100);
    var d=document.createElement("div"); d.className="round";
    d.innerHTML='<div class="nm">'+esc(t.name)+'</div><div class="st">'+cs.length+' tarjetas &middot; '+m+' dominadas</div><div class="no">'+esc(t.note)+'</div><div class="bar"><i style="width:'+pct+'%"></i></div>';
    d.onclick=function(){ start(i); };
    home.appendChild(d);
  });
}
function start(i){
  trackIdx=i;
  var cs=DATA[TRACKS[i].key];
  queue=cs.filter(function(c){ return scoreOf(c)<MASTER_AT; });
  if(!queue.length) queue=cs.slice();
  idx=0;
  document.getElementById("home").style.display="none";
  document.getElementById("play").style.display="block";
  render();
}
function dotsHTML(c){ var sc=scoreOf(c),d=""; for(var k=0;k<MASTER_AT;k++)d+='<span class="dot'+(k<sc?" on":"")+'"></span>'; return '<div class="dots">'+d+'</div>'; }
function backHTML(c){ return c.b.map(function(l){ return '<div>'+esc(l)+'</div>'; }).join(""); }
function got(c){ mastery[c.id]=Math.min(MASTER_AT,scoreOf(c)+1); save(); idx++; render(); }
function miss(c){ mastery[c.id]=0; save(); queue.push(c); idx++; render(); }
function render(){
  var bar=document.getElementById("bar");
  bar.style.width = queue.length? (idx/queue.length*100)+"%" : "100%";
  if(idx>=queue.length) return done();
  var t=TRACKS[trackIdx], c=queue[idx], el=document.getElementById("card");
  var head='<div class="kicker">'+esc(t.kicker)+' &middot; '+(idx+1)+' de '+queue.length+'</div>';
  if(t.type==="typed"){
    el.innerHTML=head+'<div class="prompt">'+esc(c.f)+'</div>'+dotsHTML(c)+
      '<input type="text" id="inp" placeholder="'+t.ph+'" autocomplete="off">'+
      '<div class="row"><button class="main-btn" id="go">Revisar</button>'+
      '<button class="ghost" id="rev">Ver respuesta</button>'+
      '<button class="audio" id="say">Escuchar</button></div>'+
      '<div class="fb" id="fb"></div>'+
      '<div class="answer" id="ans">'+backHTML(c)+'</div>'+
      '<div class="row" id="nextrow" style="display:none"><button class="main-btn" id="next">Siguiente &rarr;</button></div>';
    var inp=document.getElementById("inp"), fb=document.getElementById("fb");
    inp.addEventListener("keydown",function(e){ if(e.key==="Enter")document.getElementById("go").click(); });
    document.getElementById("say").onclick=function(){ speak(c.b[0]||c.f); };
    document.getElementById("go").onclick=function(){
      var r=check(inp.value, c.b);
      if(r==="ok"){ fb.className="fb ok"; fb.textContent="Perfecto."; showAns(); speak(c.b[0]);
        document.getElementById("next").onclick=function(){ got(c); };
      } else if(r==="close"){ fb.className="fb close"; fb.textContent="Casi. Un detalle pequeno."; }
      else { fb.className="fb no"; fb.textContent="Todavia no. Intenta otra vez o mira la respuesta."; }
    };
    document.getElementById("rev").onclick=function(){ showAns(); speak(c.b[0]||"");
      document.getElementById("next").onclick=function(){ miss(c); }; };
    function showAns(){ document.getElementById("ans").style.display="block"; document.getElementById("nextrow").style.display="flex"; }
  } else if(t.type==="pron"){
    var word=c.f.replace(/(?:^|\s)pronounce:?\s*/i,"").trim();
    el.innerHTML=head+'<div class="pron-word">'+esc(word)+'</div>'+
      '<div class="pron-arch">'+esc(c.b[0]||"")+'</div>'+dotsHTML(c)+
      (c.b.length>1?'<div class="answer" style="display:block">'+c.b.slice(1).map(function(l){return '<div>'+esc(l)+'</div>';}).join("")+'</div>':'')+
      '<div class="row"><button class="audio" id="say">Escuchar</button>'+
      '<button class="audio" id="slow">Despacio</button></div>'+
      '<div class="row"><button class="good" id="got">Lo tengo &#10003;</button>'+
      '<button class="ghost" id="miss">Otra vez</button></div>';
    var sayTxt=speakable(word)||word;
    document.getElementById("say").onclick=function(){ speak(sayTxt); };
    document.getElementById("slow").onclick=function(){ speak(sayTxt,0.65); };
    speak(sayTxt);
    document.getElementById("got").onclick=function(){ got(c); };
    document.getElementById("miss").onclick=function(){ miss(c); };
  } else {
    el.innerHTML=head+'<div class="prompt">'+esc(c.f)+'</div>'+dotsHTML(c)+
      '<div class="row"><button class="main-btn" id="rev">Ver respuesta</button>'+
      '<button class="audio" id="say">Escuchar</button></div>'+
      '<div class="answer" id="ans">'+backHTML(c)+'</div>'+
      '<div class="row" id="judge" style="display:none">'+
      '<button class="good" id="got">La tuve &#10003;</button>'+
      '<button class="ghost" id="miss">Otra vez</button></div>';
    document.getElementById("say").onclick=function(){ speak(c.b[0]||c.f); };
    document.getElementById("rev").onclick=function(){
      document.getElementById("ans").style.display="block";
      document.getElementById("judge").style.display="flex";
      this.style.display="none";
      speak(c.b[0]||"");
    };
    document.getElementById("got").onclick=function(){ got(c); };
    document.getElementById("miss").onclick=function(){ miss(c); };
  }
}
function done(){
  var t=TRACKS[trackIdx], cs=DATA[t.key], m=mcount(cs);
  document.getElementById("card").innerHTML='<div class="fin"><h2>Tema completo</h2><p>'+m+' de '+cs.length+' dominadas en '+esc(t.name)+'.</p>'+
  '<div class="row" style="justify-content:center;margin-top:16px"><button class="main-btn" id="again">Repetir tema</button></div></div>';
  document.getElementById("again").onclick=function(){ start(trackIdx); };
}
document.getElementById("backBtn").onclick=renderHome;
renderHome();
</script>
</body>
</html>
