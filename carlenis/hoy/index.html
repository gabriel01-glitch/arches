<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carlenis · Repaso de hoy</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--cream:#fbf7f0;--terra:#bf5a36;--ink:#3d3428;--soft:#8a7d6b;--line:#e8dfd2;--green:#6f8f5f;--gold:#c9a04e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--cream);color:var(--ink);font-family:'Nunito',sans-serif;font-size:16px;line-height:1.55;padding-bottom:50px}
header{text-align:center;padding:32px 18px 8px}
h1{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:32px;color:var(--terra)}
header p{color:var(--soft);font-size:13.5px;margin-top:4px}
main{max-width:620px;margin:0 auto;padding:18px 16px}
.progress{height:6px;background:var(--line);border-radius:99px;overflow:hidden;margin-bottom:16px}
.progress div{height:100%;background:var(--terra);width:0%;transition:width .3s ease}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px 18px}
.kicker{font-size:11.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--terra);margin-bottom:8px}
.prompt{font-family:'Cormorant Garamond',serif;font-size:23px;font-weight:600;line-height:1.35;margin-bottom:6px}
.hint{color:var(--soft);font-size:13.5px;font-style:italic;margin-bottom:14px}
input[type=text]{width:100%;background:var(--cream);border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:16px;font-family:'Nunito',sans-serif;color:var(--ink)}
input:focus{outline:none;border-color:var(--terra)}
.row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
button{font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;border:none;border-radius:10px;padding:12px 18px;cursor:pointer}
button:active{transform:scale(.96)}
.main-btn{background:var(--terra);color:#fff}
.ghost{background:transparent;color:var(--soft);border:1.5px solid var(--line)}
.audio{background:var(--gold);color:#fff}
.fb{margin-top:14px;font-weight:800;display:none}
.fb.ok{color:var(--green);display:block}
.fb.close{color:var(--gold);display:block}
.fb.no{color:#a34a2b;display:block}
.answer{display:none;margin-top:10px;padding:12px;border-radius:10px;background:var(--cream);border:1px dashed var(--terra);font-weight:700}
.answer small{display:block;font-weight:600;color:var(--soft);margin-top:4px}
.fin{text-align:center;padding:30px 10px}
.fin h2{font-family:'Cormorant Garamond',serif;font-size:30px;color:var(--terra)}
.fin p{color:var(--soft);margin-top:8px}
footer{text-align:center;color:var(--soft);font-size:12px;padding:24px 16px 8px}
</style>
</head>
<body>
<header>
  <h1>Repaso de hoy</h1>
  <p>Carlenis · 6 de julio de 2026 · Con tus propias frases de la clase</p>
</header>
<main>
  <div class="progress"><div id="bar"></div></div>
  <div class="card" id="card"></div>
</main>
<footer>A Tu Medida · Teacher Gabriel · ARCHES Language School</footer>
<script>
var ITEMS = [{"wrong":"I want to be a psicologist.","right":"I want to be a psychologist.","hint":"Se escribe 'psychologist' con 'psy' al inicio. La 'p' es silenciosa y se pronuncia 'sai-col-o-yist'."}];
var idx = 0;
var cardEl = document.getElementById("card");
var barEl = document.getElementById("bar");
function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function normalize(s){return s.toLowerCase().replace(/[\u2019']/g,"'").replace(/[.,!?;:]/g,"").replace(/\s+/g," ").trim().replace(/\bi'm\b/g,"i am").replace(/\bit's\b/g,"it is").replace(/\bcan't\b/g,"cannot").replace(/\bdon't\b/g,"do not");}
function lev(a,b){var m=[];for(var i=0;i<=b.length;i++){m[i]=[i];}for(var j=0;j<=a.length;j++){m[0][j]=j;}for(i=1;i<=b.length;i++){for(j=1;j<=a.length;j++){m[i][j]=b.charAt(i-1)===a.charAt(j-1)?m[i-1][j-1]:Math.min(m[i-1][j-1]+1,m[i][j-1]+1,m[i-1][j]+1);}}return m[b.length][a.length];}
function speak(t){try{var u=new SpeechSynthesisUtterance(t);u.lang="en-US";u.rate=0.92;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
function render(){
  barEl.style.width=(idx/ITEMS.length*100)+"%";
  if(idx>=ITEMS.length){return fin();}
  var it=ITEMS[idx];
  cardEl.innerHTML='<div class="kicker">Corrige la frase · '+(idx+1)+' de '+ITEMS.length+'</div>'+
  '<div class="prompt">"'+esc(it.wrong)+'"</div>'+
  '<div class="hint">'+esc(it.hint||"")+'</div>'+
  '<input type="text" id="ans" placeholder="Escribela bien..." autocomplete="off">'+
  '<div class="row"><button class="main-btn" onclick="check()">Revisar</button>'+
  '<button class="ghost" onclick="reveal()">Mostrar respuesta</button>'+
  '<button class="audio" onclick="speak(ITEMS['+idx+'].right)">Escuchar</button></div>'+
  '<div class="fb" id="fb"></div>'+
  '<div class="answer" id="answer">'+esc(it.right)+'<small>'+esc(it.hint||"")+'</small></div>'+
  '<div class="row"><button class="ghost" id="next" style="display:none" onclick="next()">Siguiente →</button></div>';
  var inp=document.getElementById("ans");
  inp.addEventListener("keydown",function(e){if(e.key==="Enter")check();});
}
function check(){
  var it=ITEMS[idx];
  var val=normalize(document.getElementById("ans").value);
  if(!val)return;
  var d=lev(val,normalize(it.right));
  var fb=document.getElementById("fb");
  if(d===0){fb.className="fb ok";fb.textContent="Perfecto.";show();}
  else if(d<=3){fb.className="fb close";fb.textContent="Casi casi. Un detalle pequeno.";}
  else{fb.className="fb no";fb.textContent="Todavia no. Mira la pista.";}
}
function reveal(){show();}
function show(){document.getElementById("answer").style.display="block";document.getElementById("next").style.display="inline-block";}
function next(){idx++;render();}
function fin(){
  barEl.style.width="100%";
  cardEl.innerHTML='<div class="fin"><h2>Repaso completado</h2><p>Los errores de hoy, dominados. Manana seran historia.</p>'+
  '<div class="row" style="justify-content:center;margin-top:16px"><button class="main-btn" onclick="idx=0;render()">Repetir</button></div></div>';
}
render();
</script>
</body>
</html>
