<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>My English Practice • Wilfredo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#fbf7f0; --surface:#fffdf9; --ink:#2c2722; --muted:#9a8f83;
    --line:#e9e0d3; --terra:#bf5a36; --terra-dark:#9f4528; --terra-tint:#f4e4d9;
    --good:#5a7d5a; --good-tint:#e6efe2; --bad-tint:#f6e2da;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:'Nunito',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;}
  .wrap{max-width:540px;margin:0 auto;padding:22px 18px 48px;}

  /* Home */
  .hero{padding:10px 2px 4px;}
  .hello{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:40px;line-height:1.02;color:var(--ink);}
  .hello .nm{color:var(--terra);}
  .sub{font-size:14.5px;color:var(--muted);font-weight:600;margin-top:8px;line-height:1.4;}
  .streak{display:inline-flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);border-radius:30px;padding:9px 16px;margin-top:18px;}
  .streak svg{display:block;}
  .streak .num{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:24px;color:var(--terra);line-height:1;}
  .streak .lab{font-size:12.5px;color:var(--muted);font-weight:700;}

  .tracks-label{font-size:11.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);font-weight:800;margin:30px 4px 14px;}
  .track{background:var(--surface);border:1.5px solid var(--line);border-radius:18px;padding:18px;margin-bottom:13px;cursor:pointer;transition:transform .08s ease,border-color .15s ease;}
  .track:active{transform:scale(.985);border-color:var(--terra);}
  .track-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;}
  .track-title{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:25px;color:var(--ink);line-height:1.1;}
  .track-count{font-size:12.5px;color:var(--muted);font-weight:700;white-space:nowrap;}
  .track-note{font-size:14px;color:var(--muted);font-weight:600;margin-top:5px;line-height:1.4;}
  .bar{height:7px;background:var(--terra-tint);border-radius:4px;margin-top:14px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:var(--terra);border-radius:4px;transition:width .5s ease;}

  /* Practice */
  .ptop{display:flex;align-items:center;gap:14px;padding:6px 0 18px;}
  .pback{background:none;border:none;color:var(--terra);font-weight:800;font-size:15px;cursor:pointer;font-family:'Nunito',sans-serif;padding:6px 2px;}
  .pbar{flex:1;height:7px;background:var(--line);border-radius:4px;overflow:hidden;}
  .pbar > i{display:block;height:100%;background:var(--terra);transition:width .35s ease;}
  .pcount{font-size:13px;color:var(--muted);font-weight:800;white-space:nowrap;}

  .kicker{font-size:11.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--terra);font-weight:800;margin-bottom:14px;}
  .card{background:var(--surface);border:1.5px solid var(--line);border-radius:20px;padding:24px 20px;}
  .prompt-es{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:30px;line-height:1.18;color:var(--ink);}
  .prompt-wrong{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:27px;line-height:1.2;color:var(--ink);}
  .prompt-wrong .mark{color:var(--terra);text-decoration:line-through;text-decoration-color:var(--terra);text-decoration-thickness:2px;}
  .hint{font-size:14px;color:var(--muted);font-weight:600;margin-top:12px;line-height:1.4;}

  .field{width:100%;margin-top:18px;background:var(--cream);border:1.5px solid var(--line);border-radius:14px;padding:15px 16px;font-family:'Nunito',sans-serif;font-size:19px;color:var(--ink);outline:none;}
  .field:focus{border-color:var(--terra);}
  .field::placeholder{color:#c4baac;}

  .btn{border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;padding:16px;cursor:pointer;transition:transform .08s ease,background .15s ease;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--terra);color:#fff;width:100%;margin-top:14px;}
  .btn-primary:active{background:var(--terra-dark);}
  .row2{display:flex;gap:10px;margin-top:14px;}
  .btn-ghost{background:var(--cream);color:var(--ink);border:1.5px solid var(--line);flex:1;}
  .btn-ghost.full{width:100%;flex:none;}

  /* choice options */
  .opts{display:flex;flex-direction:column;gap:10px;margin-top:20px;}
  .opt{background:var(--cream);border:1.5px solid var(--line);border-radius:14px;padding:16px;font-size:18px;font-weight:700;color:var(--ink);cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;transition:transform .08s ease,border-color .12s;}
  .opt:active{transform:scale(.98);}
  .opt.ok{background:var(--good-tint);border-color:var(--good);color:var(--good);}
  .opt.no{background:var(--bad-tint);border-color:var(--terra);color:var(--terra-dark);}

  /* scramble */
  .answer-row{min-height:58px;display:flex;flex-wrap:wrap;gap:8px;align-content:flex-start;margin-top:20px;padding:12px;background:var(--cream);border:1.5px dashed var(--line);border-radius:14px;}
  .pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
  .tile{background:var(--surface);border:1.5px solid var(--terra);color:var(--ink);border-radius:11px;padding:11px 14px;font-size:17px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .08s ease;}
  .tile:active{transform:scale(.95);}
  .tile.placed{background:var(--terra);color:#fff;border-color:var(--terra);}
  .answer-row .empty{color:#c4baac;font-style:italic;font-size:15px;align-self:center;}

  /* pron */
  .pron-word{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:46px;text-align:center;color:var(--ink);margin-top:8px;line-height:1;}
  .pron-arch{text-align:center;font-size:24px;font-weight:800;color:var(--terra);letter-spacing:1px;margin-top:14px;}
  .pron-arch .up{}

  .speaker{display:inline-flex;align-items:center;justify-content:center;gap:9px;background:var(--cream);border:1.5px solid var(--line);border-radius:30px;padding:12px 20px;font-weight:800;font-size:15px;color:var(--ink);cursor:pointer;font-family:'Nunito',sans-serif;margin:18px auto 0;width:100%;}
  .speaker:active{border-color:var(--terra);}
  .speaker svg{display:block;}

  /* feedback */
  .fb{margin-top:16px;border-radius:14px;padding:15px 16px;font-weight:700;font-size:15.5px;line-height:1.4;}
  .fb.ok{background:var(--good-tint);color:var(--good);}
  .fb.close{background:#f7eede;color:#9a6b1e;}
  .fb.no{background:var(--bad-tint);color:var(--terra-dark);}
  .fb .ans{display:block;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:22px;margin-top:6px;color:var(--ink);}

  /* summary */
  .done{text-align:center;padding:30px 10px;}
  .done h2{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:34px;color:var(--ink);margin:0 0 6px;}
  .done .score{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:64px;color:var(--terra);line-height:1;margin:14px 0;}
  .done p{color:var(--muted);font-weight:600;font-size:15px;margin:0 0 24px;}

  .credit{text-align:center;color:#c9bdac;font-size:11.5px;font-weight:700;margin-top:34px;letter-spacing:.5px;}

  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>

  function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
  function yestStr(){ const d=new Date(Date.now()-86400000); return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate(); }
  function bumpStreak(){
    const s = store.get(sKey+"_streak", {last:null,count:0});
    const t = todayStr();
    if(s.last===t){ /* already counted today */ }
    else if(s.last===yestStr()){ s.count+=1; s.last=t; }
    else { s.count=1; s.last=t; }
    store.set(sKey+"_streak", s);
    return s.count;
  }

  // ---------- text matching ----------
  const CMAP = {"it's":"it is","i'm":"i am","don't":"do not","doesn't":"does not","didn't":"did not","isn't":"is not","aren't":"are not","wasn't":"was not","weren't":"were not","can't":"cannot","won't":"will not","i'll":"i will","she's":"she is","he's":"he is","they're":"they are","you're":"you are","we're":"we are","that's":"that is","what's":"what is","there's":"there is","let's":"let us","i've":"i have","you've":"you have","we've":"we have","they've":"they have","hasn't":"has not","haven't":"have not","hadn't":"had not","wouldn't":"would not","couldn't":"could not","shouldn't":"should not","she'll":"she will","he'll":"he will","you'll":"you will","we'll":"we will","they'll":"they will",
    "dont":"do not","doesnt":"does not","didnt":"did not","isnt":"is not","arent":"are not","wasnt":"was not","werent":"were not","cant":"cannot","wont":"will not","hasnt":"has not","havent":"have not","hadnt":"had not","wouldnt":"would not","couldnt":"could not","shouldnt":"should not"};
  function norm(s){
    s=(s||"").toLowerCase().replace(/[‘’ʼ`]/g,"'").trim();
    Object.keys(CMAP).forEach(k=>{ s=s.replace(new RegExp("\\b"+k.replace(/'/g,"'")+"\\b","g"), CMAP[k]); });
    s=s.replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim();
    return s;
  }
  function lev(a,b){
    const m=a.length,n=b.length; if(!m)return n; if(!n)return m;
    let prev=Array.from({length:n+1},(_,i)=>i), cur=new Array(n+1);
    for(let i=1;i<=m;i++){ cur[0]=i;
      for(let j=1;j<=n;j++){ cur[j]=Math.min(prev[j]+1,cur[j-1]+1,prev[j-1]+(a[i-1]===b[j-1]?0:1)); }
      [prev,cur]=[cur,prev];
    }
    return prev[n];
  }
  // returns "ok" | "close" | "no"
  function check(input, answer, alts){
    const ni=norm(input); if(!ni) return "no";
    const targets=[answer].concat(alts||[]).map(norm);
    if(targets.indexOf(ni)>=0) return "ok";
    let best=99; targets.forEach(t=>{ best=Math.min(best, lev(ni,t)); });
    const tol=Math.max(1, Math.floor(answer.length*0.12));
    return best<=tol ? "close" : "no";
  }

  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  // scramble
  function cardScramble(it, advance){
    const correct = it.answer.trim().split(/\s+/);
    const tiles = shuffle(correct.concat(it.extra||[]));
    let placed=[]; // indexes into a tile model
    const model = tiles.map((w,idx)=>({w,idx,used:false}));
    practiceShell('<div class="kicker">Ordena la frase</div><div class="card">'+
      (it.note?'<div class="hint" style="margin-top:0">'+esc(it.note)+'</div>':'')+
      '<div class="answer-row" id="ans"></div>'+
      '<div class="pool" id="pool"></div>'+
      '<div id="fb"></div>'+
      '<button class="btn btn-primary" id="go">Revisar</button>'+
      '<div class="row2"><button class="btn btn-ghost full" id="reset">Reiniciar</button></div></div>');
    const ansRow=document.getElementById("ans"), pool=document.getElementById("pool"), fb=document.getElementById("fb"), go=document.getElementById("go");
    function draw(){
      ansRow.innerHTML=""; pool.innerHTML="";
      if(!placed.length){ ansRow.appendChild(el('<span class="empty">Toca las palabras en orden</span>')); }
      placed.forEach(mi=>{
        const tile=el('<button class="tile placed">'+esc(model[mi].w)+'</button>');
        tile.onclick=()=>{ model[mi].used=false; placed=placed.filter(x=>x!==mi); fb.innerHTML=""; go.textContent="Revisar"; go.onclick=submit; draw(); };
        ansRow.appendChild(tile);
      });
      model.forEach((m,mi)=>{
        if(m.used) return;
        const tile=el('<button class="tile">'+esc(m.w)+'</button>');
        tile.onclick=()=>{ m.used=true; placed.push(mi); fb.innerHTML=""; draw(); };
        pool.appendChild(tile);
      });
    }
    function submit(){
      const built=placed.map(mi=>model[mi].w);
      const ok = built.length===correct.length && built.every((w,k)=>norm(w)===norm(correct[k]));
      if(ok){
        fb.innerHTML='<div class="fb ok">Perfecto.<span class="ans">'+esc(it.answer)+'</span></div>';
        speak(it.say||it.answer);
        go.textContent="Siguiente"; go.onclick=()=>advance(true);
      } else {
        fb.innerHTML='<div class="fb no">Ese orden no. Ajusta las palabras.</div>';
      }
    }
    document.getElementById("reset").onclick=()=>{ placed=[]; model.forEach(m=>m.used=false); fb.innerHTML=""; go.textContent="Revisar"; go.onclick=submit; draw(); };
    go.onclick=submit;
    draw();
  }

      (it.note?'<div class="hint" style="text-align:center">'+esc(it.note)+'</div>':'')+
      '<button class="speaker" id="play">'+speakerSVG+'Escuchar y repetir</button>'+
      '<button class="speaker" id="slowp" style="margin-top:10px">'+speakerSVG+'Escuchar despacio</button>'+
      '<div class="row2"><button class="btn btn-ghost" id="again">Otra vez</button><button class="btn btn-primary" id="got" style="margin-top:0">Lo tengo</button></div></div>');
    document.getElementById("play").onclick=()=>speak(it.say||it.word);
    document.getElementById("slowp").onclick=()=>speak(it.say||it.word, 0.68);
    setTimeout(()=>speak(it.say||it.word), 350);
    document.getElementById("again").onclick=()=>advance(false);
    document.getElementById("got").onclick=()=>advance(true);
  }

  // summary
  function renderSummary(){
    const count=bumpStreak();
    const pct = sessionTotal? Math.round(sessionRight/sessionTotal*100):0;
    let line;
    if(pct===100) line="Todo limpio. Excelente.";
    else if(pct>=70) line="Buen trabajo. Casi todo dominado.";
    else line="Buen comienzo. Repite el tema para fijarlo.";
    app.innerHTML='<div class="done">'+
      '<h2>'+esc(track.title)+'</h2>'+
      '<div class="score">'+sessionRight+'/'+sessionTotal+'</div>'+
      '<p>'+line+'</p>'+
      '<div class="streak" style="margin-bottom:22px">'+flameSVG+'<span class="num">'+count+'</span><span class="lab">'+(count===1?'día seguido':'días seguidos')+'</span></div>'+
      '<button class="btn btn-primary" id="again">Repetir tema</button>'+
      '<div class="row2"><button class="btn btn-ghost full" id="home">Volver a temas</button></div></div>';
    document.getElementById("again").onclick=()=>startTrack(track);
    document.getElementById("home").onclick=renderHome;
  }

  function esc(s){ return (s==null?"":""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  renderHome();
})();
</script>
</body>
</html>
